version: '3.8'

services:
  validator:
    build:
      context: .
      dockerfile: docker/validator/Dockerfile
    image: hydrogen-validator:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - .:/app
    command: python3 -m neurons.validator

  # Example: You can create additional profiles for specialized images
  # validator-neuralop:
